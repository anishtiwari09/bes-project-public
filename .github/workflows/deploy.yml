name: Auto Commit for Owner Account

on:
  push:
    branches:
      - master  # Trigger on any push to the master branch

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Grant write access to repository contents

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: master

      # Step 2: Set up Git configuration for Account A (Owner)
      - name: Set up Git for Account A (Owner)
        run: |
          # Fetch the GitHub owner's username from the context
          OWNER_USERNAME="${{ github.repository_owner }}"

          # Set Git configuration dynamically using the owner's username
          git config user.name "$OWNER_USERNAME"
          git config user.email "${OWNER_USERNAME}@users.noreply.github.com"

      # Step 3: Get the commit author and check if it's not from Account A
      - name: Check commit author
        id: check_author
        run: |
          # Get the last commit author
          LAST_COMMIT_AUTHOR=$(git log -1 --pretty=%an)

          # If the commit author is Account A (owner), skip the commit
          if [[ "$LAST_COMMIT_AUTHOR" == "${{ github.repository_owner }}" ]]; then
            echo "Commit made by the owner account, skipping commit."
            exit 0
          else
            echo "Commit made by $LAST_COMMIT_AUTHOR, proceeding with new commit."
          fi

      # Step 4: Check if there are any file changes from Account B and create a new commit from Account A
      - name: Create a new commit with Account A's message
        run: |
          # Extract the last commit message (from Account B)
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # Prefix the message with "dep --" (or any other prefix you prefer)
          NEW_COMMIT_MSG="dep -- $COMMIT_MSG"

          # Stage the changes (if there are any)
          git add .

          # Check if there are any staged changes. If there are no changes, we need to create an empty commit.
          if ! git diff --cached --quiet; then
            echo "No changes to commit, creating an empty commit with message."
            git commit --allow-empty -m "$NEW_COMMIT_MSG"  # Create a dummy commit with the new message
          else
            echo "Changes detected, creating commit with changes."
            git commit -m "$NEW_COMMIT_MSG"  # Commit if there are actual changes
          fi

      # Step 5: Push the new commit from Account A (owner)
      - name: Push changes from owner account
        run: |
          git push https://github.com/${{ github.repository }}.git master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub Token to authenticate the push
