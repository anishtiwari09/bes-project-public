name: Auto Commit for Owner Account

on:
  push:
    branches:
      - master  # Trigger on any push to the master branch

jobs:
  auto_commit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: master

      # Step 2: Get the owner account name and email automatically
      - name: Get owner account name and email
        id: get_owner
        run: |
          # Fetch the GitHub owner's username from the context
          OWNER_USERNAME="${{ github.repository_owner }}"

          # Use GitHub API to get the owner's email (public email)
          OWNER_EMAIL=$(curl -s https://api.github.com/users/$OWNER_USERNAME | jq -r .email)

          echo "OWNER_USERNAME=$OWNER_USERNAME"
          echo "OWNER_EMAIL=$OWNER_EMAIL"

          # Set Git configuration using the owner's name and email
          git config user.name "$OWNER_USERNAME"
          git config user.email "$OWNER_EMAIL"
          
      # Step 3: Get commit author and check if it's not the owner account
      - name: Check commit author
        id: check_author
        run: |
          # Get the last commit author
          LAST_COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          
          # If the author is the owner account, exit the action early
          if [[ "$LAST_COMMIT_AUTHOR" == "${{ github.repository_owner }}" ]]; then
            echo "Commit made by the owner account, skipping."
            exit 0
          else
            echo "Commit made by $LAST_COMMIT_AUTHOR, proceeding with new commit."
          fi

      # Step 4: Extract the last commit message and create a new commit from the owner account
      - name: Create a commit from owner account
        run: |
          # Extract the last commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # Prefix the message with "dep --"
          NEW_COMMIT_MSG="dep -- $COMMIT_MSG"

          # Stage and commit the changes
          git add .
          git commit -m "$NEW_COMMIT_MSG"

      # Step 5: Push the new commit to the master branch from the owner account
      - name: Push changes from owner account
        run: |
          git push https://github.com/${{ github.repository }}.git master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub Token to authenticate the push
