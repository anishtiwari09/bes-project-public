name: Auto Commit for Account A

on:
  push:
    branches:
      - master  # This triggers when there’s a push to the master branch

jobs:
  auto_commit:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: master  # Ensures it's the master branch

      # Step 2: Set up Git for committing as Account A
      - name: Set up Git configuration
        run: |
          git config user.name "anishtiwari09"  # Name of Account A
          git config user.email "aneeshtiwari24@gmail.com"  # Email of Account A

      # Step 3: Create a new commit with the message format
      - name: Create a commit from Account A
        run: |
          # Extract the commit message from Account B's push
          COMMIT_MSG=$(git log -1 --pretty=%B)
          
          # Modify the commit message and create a new commit from Account A
          NEW_COMMIT_MSG="deploy -- $COMMIT_MSG"
          
          # Stage and commit the changes
          git add .
          git commit -m "$NEW_COMMIT_MSG"

      # Step 4: Push the commit back to the master branch from Account A
      - name: Push changes from Account A
        run: |
          git push https://github.com/<your-username>/<your-repo>.git master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # This GitHub token allows pushing changes to the repository
